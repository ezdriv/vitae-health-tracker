# Build native installers and publish GitHub Releases
# Triggers: version tag (v1.0.0) or manual "Run workflow"
name: Release Installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Mac Apple Silicon (.dmg)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Ensure app icons
        run: |
          if [ ! -f src-tauri/icons/icon.icns ]; then
            node scripts/generate-icon.mjs
            npx tauri icon app-icon.png
          fi

      - name: Build .dmg
        run: npm run build:mac

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-linux:
    name: Linux Mint / Debian (.deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            librsvg2-bin \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Ensure app icons
        run: |
          if [ ! -f src-tauri/icons/icon.png ]; then
            rsvg-convert -w 1024 -h 1024 icon.svg -o app-icon.png
            npx tauri icon app-icon.png
          fi

      - name: Build .deb
        run: npm run build:linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-mac, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          name: Vitae Health Tracker ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}